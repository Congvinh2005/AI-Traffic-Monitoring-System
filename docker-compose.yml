version: "3.8"

services:
  ai-traffic-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      # Đảm bảo build cho platform hiện tại (arm64 trên M1 Mac)
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: ai-traffic-monitor
    ports:
      - "5000:5000" # Flask web server
    environment:
      - FLASK_APP=py/Web/all_tong.py
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount weights để dùng models từ host
      - ./py/weights:/app/py/weights
      # Mount recordings để lưu video vào host
      - ./recordings:/app/recordings
      # Mount Sound để lấy file âm thanh
      - ./py/Sound:/app/py/Sound
      # Mount video_input nếu cần dùng video từ host
      - ./py/video_input:/app/py/video_input
    # Giữ container chạy kể cả khi có lỗi
    restart: unless-stopped
    # Timeout 30s khi dừng
    stop_grace_period: 30s

  # Optional: Nếu bạn muốn chạy một script training khác song song
  # Uncomment và chỉnh FLASK_APP để chạy file khác
