<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử vi phạm</title>
    <link rel="icon" type="image/png" href="./assets/img/fabicon.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #1e88e5;
            --danger-color: #e53935;
            --warning-color: #ff9800;
            --success-color: #4caf50;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-hover: #1f4068;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
            --border-color: #2d3e5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--text-white);
            min-height: 100vh;
            padding: 20px;
        }

        .logout-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10000;
            padding: 10px 20px;
            background-color: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s ease;
        }

        .logout-btn:hover {
            background-color: #c62828;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: var(--text-white);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-gray);
            font-size: 16px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: var(--bg-hover);
            color: var(--text-white);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: var(--text-white);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-critical {
            background: rgba(229, 57, 53, 0.2);
            color: var(--danger-color);
        }

        .badge-warning {
            background: rgba(255, 152, 0, 0.2);
            color: var(--warning-color);
        }

        .badge-info {
            background: rgba(30, 136, 229, 0.2);
            color: var(--primary-color);
        }

        .badge-success {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-color);
        }

        .card-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        .info-value {
            font-size: 14px;
            color: var(--text-white);
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #1565c0;
        }

        .btn-secondary {
            background: var(--border-color);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #388e3c;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: var(--bg-hover);
            color: var(--text-white);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        td {
            color: var(--text-white);
        }

        tr:hover {
            background: var(--bg-hover);
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .video-thumbnail {
            width: 100%;
            height: 200px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(30, 136, 229, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-gray);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tabs {
                flex-wrap: wrap;
            }

            .tab-btn {
                flex: 1;
                min-width: 120px;
            }

            .card-body {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
    </button>

    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="btn btn-secondary" onclick="window.location.href='/trang_chu'" style="padding: 10px 20px;">
                    <i class="fa-solid fa-arrow-left"></i> Về trang chủ
                </button>
            </div>
            <h1><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử vi phạm</h1>
            <p>Theo dõi lịch sử vi phạm, video và cảnh báo từ admin</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('violations')">
                <i class="fa-solid fa-triangle-exclamation"></i> Lịch sử vi phạm
            </button>
            
            <button class="tab-btn" onclick="switchTab('warnings')">
                <i class="fa-solid fa-bell"></i> Cảnh báo Admin
            </button>
        </div>

        <!-- Tab 1: Lịch sử vi phạm -->
        <div id="violations" class="tab-content active">
            <div id="violations-loading" class="loading">
                <div class="spinner"></div>
                <p>Đang tải dữ liệu...</p>
            </div>
            <div id="violations-content"></div>
        </div>

        <!-- Tab 2: Video vi phạm -->
        <div id="videos" class="tab-content">
            <div id="videos-loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Đang tải video...</p>
            </div>
            <div id="videos-content" class="video-grid"></div>
        </div>

        <!-- Tab 3: Cảnh báo từ Admin -->
        <div id="warnings" class="tab-content">
            <div id="warnings-loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Đang tải cảnh báo...</p>
            </div>
            <div id="warnings-content"></div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Video vi phạm</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <video id="modal-video" controls style="width: 100%; border-radius: 8px;">
                    <source src="" type="video/mp4">
                    Trình duyệt không hỗ trợ video.
                </video>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        // Global pagination variables
        let currentPage = 1;
        let totalPages = 1;
        const perPage = 10; // 10 vi phạm/trang cho tài xế

        // Switch tab
        function switchTab(tabName) {
            // Update active tab button
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.tab-btn').classList.add('active');

            // Update active tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');

            // Reset pagination when switching tabs
            currentPage = 1;
            totalPages = 1;

            // Load data for tab
            if (tabName === 'violations') {
                loadViolations();
            } else if (tabName === 'videos') {
                loadVideos();
            } else if (tabName === 'warnings') {
                loadWarnings();
            }
        }

        // Load violations
        function loadViolations(page = 1) {
            const loading = document.getElementById('violations-loading');
            const content = document.getElementById('violations-content');

            loading.style.display = 'block';
            content.innerHTML = '';

            fetch(`/api/alerts?page=${page}`)
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';

                    if (data.success && data.alerts && data.alerts.length > 0) {
                        data.alerts.forEach(alert => {
                            const card = createViolationCard(alert);
                            content.appendChild(card);
                        });
                        
                        // Update pagination
                        currentPage = data.page;
                        totalPages = data.total_pages;
                        updateViolationsPagination();
                    } else {
                        content.innerHTML = `
                            <div class="empty-state">
                                <i class="fa-solid fa-check-circle"></i>
                                <p>Không có vi phạm nào</p>
                            </div>
                        `;
                        // Remove pagination if no data
                        const oldPagination = document.querySelector('.violations-pagination');
                        if (oldPagination) oldPagination.remove();
                    }
                })
                .catch(err => {
                    console.error('Error loading violations:', err);
                    loading.style.display = 'none';
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            <p>Không thể tải dữ liệu</p>
                        </div>
                    `;
                });
        }

        function updateViolationsPagination() {
            // Remove old pagination
            const oldPagination = document.querySelector('.violations-pagination');
            if (oldPagination) oldPagination.remove();
            
            if (totalPages <= 1) return;
            
            const violationsTab = document.getElementById('violations');
            const paginationDiv = document.createElement('div');
            paginationDiv.className = 'violations-pagination';
            paginationDiv.style.cssText = 'display:flex;justify-content:center;align-items:center;gap:10px;margin-top:20px;padding:15px;background:var(--bg-card);border-radius:8px;';
            
            let html = `
                <button class="btn btn-secondary" onclick="loadViolations(1)" ${currentPage === 1 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''} style="padding:8px 16px;">
                    <i class="fa-solid fa-angles-left"></i> Đầu
                </button>
                <button class="btn btn-secondary" onclick="loadViolations(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''} style="padding:8px 16px;">
                    <i class="fa-solid fa-angle-left"></i> Trước
                </button>
                <span style="color:var(--text-secondary);margin:0 10px;">
                    Trang ${currentPage}/${totalPages} (${perPage} vi phạm/trang)
                </span>
                <button class="btn btn-secondary" onclick="loadViolations(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''} style="padding:8px 16px;">
                    Sau <i class="fa-solid fa-angle-right"></i>
                </button>
                <button class="btn btn-secondary" onclick="loadViolations(${totalPages})" ${currentPage === totalPages ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''} style="padding:8px 16px;">
                    Cuối <i class="fa-solid fa-angles-right"></i>
                </button>
            `;
            
            paginationDiv.innerHTML = html;
            violationsTab.appendChild(paginationDiv);
        }

        function createViolationCard(alert) {
            const card = document.createElement('div');
            card.className = 'card';

            const typeIcons = {
                'eye': 'fa-eye',
                'yawn': 'fa-face-tired',
                'head': 'fa-head-side',
                'phone': 'fa-mobile-screen',
                'seatbelt': 'fa-user-shield',
                'hand': 'fa-hand',
                'collision': 'fa-car-crash',
                'lane': 'fa-road',
                'obstacle': 'fa-triangle-exclamation'
            };

            const typeNames = {
                'eye': 'Nhắm mắt quá lâu',
                'yawn': 'Ngáp ngủ',
                'head': 'Mất tập trung',
                'phone': 'Dùng điện thoại',
                'seatbelt': 'Không đeo dây an toàn',
                'hand': 'Không cầm vô lăng',
                'collision': 'Va chạm',
                'lane': 'Lệch làn',
                'obstacle': 'Vật cản'
            };

            const badgeClass = alert.level === 'critical' ? 'badge-critical' : 
                              alert.level === 'warning' ? 'badge-warning' : 'badge-info';

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">
                        <i class="fa-solid ${typeIcons[alert.type] || 'fa-exclamation'}"></i>
                        ${typeNames[alert.type] || alert.type}
                    </div>
                    <span class="card-badge ${badgeClass}">${alert.level === 'critical' ? 'Nghiêm trọng' : alert.level === 'warning' ? 'Cảnh báo' : 'Thông tin'}</span>
                </div>
                <div class="card-body">
                    <div class="info-item">
                        <span class="info-label">Thời gian</span>
                        <span class="info-value">${new Date(alert.timestamp).toLocaleString('vi-VN')}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Phương tiện</span>
                        <span class="info-value">${alert.vehicle_plate || 'N/A'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Tài xế</span>
                        <span class="info-value">${alert.driver_name || 'N/A'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Trạng thái</span>
                        <span class="info-value">${alert.is_read ? '<span style="color: var(--success-color);">Đã đọc</span>' : '<span style="color: var(--warning-color);">Chưa đọc</span>'}</span>
                    </div>
                </div>
                <div class="card-actions">
                    ${alert.video_path ? `<button class="btn btn-primary" onclick="playVideo('${alert.video_path}')"><i class="fa-solid fa-play"></i> Xem video</button>` : ''}
                    ${!alert.is_read ? `<button class="btn btn-success" onclick="markAsRead(${alert.id})"><i class="fa-solid fa-check"></i> Đánh dấu đã đọc</button>` : ''}
                </div>
            `;

            return card;
        }

        // Load videos
        function loadVideos() {
            const loading = document.getElementById('videos-loading');
            const content = document.getElementById('videos-content');
            
            loading.style.display = 'block';
            content.innerHTML = '';

            fetch('/api/videos')
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    
                    if (data.success && data.videos && data.videos.length > 0) {
                        data.videos.forEach(video => {
                            const card = createVideoCard(video);
                            content.appendChild(card);
                        });
                    } else {
                        content.innerHTML = `
                            <div class="empty-state">
                                <i class="fa-solid fa-video-slash"></i>
                                <p>Không có video vi phạm</p>
                            </div>
                        `;
                    }
                })
                .catch(err => {
                    console.error('Error loading videos:', err);
                    loading.style.display = 'none';
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            <p>Không thể tải dữ liệu</p>
                        </div>
                    `;
                });
        }

        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = 'video-card';

            card.innerHTML = `
                <div class="video-thumbnail" onclick="openVideoModal('${video.path}', '${video.title}')">
                    <img src="${video.thumbnail || '/static/video-thumbnail.png'}" alt="${video.title}">
                    <div class="play-icon">
                        <i class="fa-solid fa-play" style="color: white;"></i>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">
                        <span><i class="fa-regular fa-clock"></i> ${new Date(video.timestamp).toLocaleString('vi-VN')}</span>
                        <span><i class="fa-regular fa-clock"></i> ${video.duration || 'N/A'}</span>
                    </div>
                </div>
            `;

            return card;
        }

        // Load warnings from admin
        function loadWarnings() {
            const loading = document.getElementById('warnings-loading');
            const content = document.getElementById('warnings-content');
            
            loading.style.display = 'block';
            content.innerHTML = '';

            fetch('/api/admin-warnings')
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    
                    if (data.success && data.warnings && data.warnings.length > 0) {
                        data.warnings.forEach(warning => {
                            const card = createWarningCard(warning);
                            content.appendChild(card);
                        });
                    } else {
                        content.innerHTML = `
                            <div class="empty-state">
                                <i class="fa-solid fa-bell-slash"></i>
                                <p>Không có cảnh báo từ admin</p>
                            </div>
                        `;
                    }
                })
                .catch(err => {
                    console.error('Error loading warnings:', err);
                    loading.style.display = 'none';
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            <p>Không thể tải dữ liệu</p>
                        </div>
                    `;
                });
        }

        function createWarningCard(warning) {
            const card = document.createElement('div');
            card.className = 'card';

            const priorityColors = {
                'low': 'badge-info',
                'medium': 'badge-warning',
                'high': 'badge-critical'
            };

            const priorityNames = {
                'low': 'Thấp',
                'medium': 'Trung bình',
                'high': 'Cao'
            };

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">
                        <i class="fa-solid fa-bell"></i>
                        Cảnh báo từ Admin
                    </div>
                    <span class="card-badge ${priorityColors[warning.priority]}">${priorityNames[warning.priority]}</span>
                </div>
                <div class="card-body">
                    <div class="info-item" style="grid-column: 1 / -1;">
                        <span class="info-label">Nội dung</span>
                        <span class="info-value">${warning.message}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Phương tiện</span>
                        <span class="info-value">${warning.vehicle_plate || 'N/A'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Thời gian</span>
                        <span class="info-value">${new Date(warning.created_at).toLocaleString('vi-VN')}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Trạng thái</span>
                        <span class="info-value">${warning.is_read ? '<span style="color: var(--success-color);">Đã đọc</span>' : '<span style="color: var(--warning-color);">Chưa đọc</span>'}</span>
                    </div>
                </div>
                <div class="card-actions">
                    ${!warning.is_read ? `<button class="btn btn-success" onclick="markWarningAsRead(${warning.id})"><i class="fa-solid fa-check"></i> Đánh dấu đã đọc</button>` : ''}
                </div>
            `;

            return card;
        }

        // Video modal
        function openVideoModal(videoPath, title) {
            const modal = document.getElementById('video-modal');
            const video = document.getElementById('modal-video');
            const titleEl = document.getElementById('modal-title');

            video.src = videoPath;
            titleEl.textContent = title;
            modal.classList.add('active');
            video.play();
        }

        function closeModal() {
            const modal = document.getElementById('video-modal');
            const video = document.getElementById('modal-video');
            
            modal.classList.remove('active');
            video.pause();
            video.currentTime = 0;
        }

        // Mark as read
        function markAsRead(alertId) {
            fetch(`/api/alerts/${alertId}/read`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    loadViolations();
                } else {
                    alert('Không thể đánh dấu đã đọc');
                }
            })
            .catch(err => {
                console.error('Error marking as read:', err);
                alert('Có lỗi xảy ra');
            });
        }

        function markWarningAsRead(warningId) {
            fetch(`/api/admin-warnings/${warningId}/read`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    loadWarnings();
                } else {
                    alert('Không thể đánh dấu đã đọc');
                }
            })
            .catch(err => {
                console.error('Error marking as read:', err);
                alert('Có lỗi xảy ra');
            });
        }

        // Logout
        function logout() {
            fetch('/api/logout', {
                method: 'POST',
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect || '/login';
                } else {
                    alert('Đăng xuất thất bại: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Lỗi đăng xuất:', error);
                alert('Có lỗi xảy ra khi đăng xuất');
            });
        }

        // Load violations on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadViolations();
        });

        // Close modal when clicking outside
        document.getElementById('video-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
