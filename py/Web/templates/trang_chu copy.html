<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình ô tô</title>
    <link rel="icon" type="image/png" href="./assets/img/fabicon.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/themify-icons/1.0.1/css/themify-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/screnn_o_to.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <script src="assets/node.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #d8dde0, #82bbce);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-button {
            background-color: #444;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            padding: 30px 20px;
            text-align: center;
            transition: background-color 0.3s;
            cursor: pointer;
            height: 200px;
            width: 300px;
        }

        .app-button:hover {
            background-color: #666;
        }

        .app-button span {
            display: block;
        }

        .content {
            font-size: 40px;
        }

        /* Tùy chỉnh màu riêng cho từng ứng dụng */
        .dien-thoai {
            background-color: green;
        }

        .tin-nhan {
            background-color: lightgreen;
            color: black;
        }

        .google-maps {
            background-color: blue;
        }

        .nhac {
            background-color: red;
        }

        .spotify {
            background-color: darkgreen;
        }

        .dang-phat {
            background-color: orange;
            color: black;
        }

        .am-thanh {
            background-color: violet;
            color: black;
        }

        .cai-dat {
            background-color: gray;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="app-grid">
            <button class="app-button dien-thoai">
                <a href="https://play.google.com/store/apps/details?id=co.kitetech.dialer&hl=vi" class=""></a>
                <span class="content">Điện thoại</span>
            </button>
            <button class="app-button tin-nhan">
                <a href="https://www.facebook.com/messages/e2ee/t/9808668312549225" class=""></a>
                <span class="content">Tin nhắn</span>
            </button>
            <button class="app-button google-maps">
                <a href="https://www.google.com/maps/?hl=vi" class=""></a>
                <span class="content">Google Maps</span>
            </button>
            <button class="app-button nhac">
                <a href="https://www.youtube.com/watch?v=BmOwHvMSMh0" class=""></a>
                <span class="content">Nhạc</span>
            </button>
            <button class="app-button spotify">
                <a href="https://open.spotify.com/" class=""></a>
                <span class="content">Spotify</span>
            </button>
            <button class="app-button dang-phat">
                <a href="https://open.spotify.com/" class=""></a>
                <span class="content">Đang phát</span>
            </button>
            <button class="app-button am-thanh" onclick="window.location.href='/hands'">
                <a href="https://open.spotify.com/" class=""></a>
                <span class="content">Âm thanh</span>
            </button>
            <button class="app-button cai-dat" onclick="window.location.href='/lai_xe'">
                <span class="content">Lái xe an toàn</span>
            </button>


        </div>
    </div>
</body>

</html>
