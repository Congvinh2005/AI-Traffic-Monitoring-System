<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình ô tô</title>
    <link rel="icon" type="image/png" href="./assets/img/fabicon.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/themify-icons/1.0.1/css/themify-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <script src="assets/node.js"></script>
    <script>
        // Kiểm tra hỗ trợ Speech Recognition API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        let recognition = null;
        let isListening = false;
        let startBtn = null;
        let stopBtn = null;
        let voiceOutput = null;

        if (SpeechRecognition) {
            // Khởi tạo nhận diện giọng nói
            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.continuous = false; // Tắt continuous để nhanh có kết quả cuối cùng
            recognition.interimResults = true; // Hiển thị lời nói liên tục

            // Map các từ khóa với các ứng dụng
            const appCommands = {
                'điện thoại': '.dien-thoai a',
                'tin nhắn': '.tin-nhan a',
                'google maps': '.google-maps a',
                'nhạc': '.nhac a',
                'spotify': '.spotify a',
                'youtube': '.youtube a',
                'âm thanh': '.am-thanh a',
                'dùng tay': '.hands a',
                'lái xe': '.lai_xe a',
                'mở tư vấn': '.tu_van a',
                'mở quản lý': '.quanly a',
                'quản lý xe': '.quanly a',
                'quản trị': '.quanly a',
                'tư vấn luật': '.tu_van a',
                'luật giao thông': '.tu_van a',
                'traffic bus': '.quanly a',
                'quản lý xe bus': '.quanly a'
            };

            // Cờ ngăn chặn mở nhiều tab
            let isProcessingCommand = false;
            let lastOpenedTab = null;
            let lastOpenTime = 0;
            let lastCommand = '';
            let lastCommandTime = 0;

            // Hàm đọc văn bản (nhanh, không chờ)
            function speak(text) {
                window.speechSynthesis.cancel(); // Dừng đọc cũ
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 1.5; // Đọc nhanh hơn (1.5x)
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            }

            // Xử lý kết quả nhận diện
            recognition.onresult = function (event) {
                const result = event.results[event.results.length - 1];
                const transcript = result[0].transcript.toLowerCase().trim();

                // Hiển thị lời nói liên tục (cả interim và final)
                if (voiceOutput) {
                    voiceOutput.textContent = `🗣 ${result.isFinal ? '✓' : '🎤'} ${transcript}`;
                }

                // Chỉ xử lý lệnh khi có kết quả cuối cùng
                if (!result.isFinal) {
                    return;
                }

                console.log('Nhận diện được:', transcript);

                // Kiểm tra trùng lệnh: không xử lý cùng lệnh trong vòng 3 giây
                const currentTime = Date.now();
                if (lastCommand && (currentTime - lastCommandTime) < 3000 && transcript.includes(lastCommand)) {
                    console.log('Lệnh trùng, bỏ qua');
                    return;
                }

                // Kiểm tra lệnh về trang chủ
                if (transcript.includes("trang chủ") || transcript.includes("về trang chủ")) {
                    speak("Đang chuyển về trang chủ");
                    window.location.href = "/";
                    return;
                }

                // Kiểm tra và thực hiện lệnh - ưu tiên khớp dài nhất trước
                const sortedCommands = Object.entries(appCommands).sort((a, b) => b[0].length - a[0].length);

                for (const [command, selector] of sortedCommands) {
                    if (transcript.includes(command)) {
                        console.log('Tìm thấy lệnh:', command);
                        const element = document.querySelector(selector);
                        if (element && element.href) {
                            console.log('Đang mở:', command);
                            
                            // Đặt cờ để chặn mở nhiều tab
                            isProcessingCommand = true;
                            lastOpenedTab = element.href;
                            lastOpenTime = Date.now();
                            lastCommand = command;
                            lastCommandTime = Date.now();

                            // Đọc phản hồi nhanh (không chờ)
                            speak(`Đang mở ${command}`);

                            // Mở tab mới cho các app ngoài, trừ 'dùng tay' và 'lái xe'
                            if (command === 'dùng tay' || command === 'lái xe') {
                                window.location.href = element.href;
                            } else {
                                window.open(element.href, '_blank', 'noopener,noreferrer');
                            }

                            // Reset cờ sau 3 giây
                            setTimeout(() => {
                                isProcessingCommand = false;
                            }, 3000);
                            break;
                        }
                    }
                }

                // Xử lý lệnh mở tư vấn luật và quản lý - chỉ xử lý trong appCommands
                // Không cần xử lý riêng vì đã có trong appCommands
            };

            // Xử lý lỗi
            recognition.onerror = function (event) {
                console.error('Lỗi nhận diện giọng nói:', event.error);
                
                if (event.error === 'not-allowed' || event.error === 'permission-denied') {
                    if (voiceOutput) {
                        voiceOutput.textContent = "❌ Micro bị chặn! Vui lòng cấp quyền microphone.";
                    }
                    isListening = false;
                    if (startBtn) {
                        startBtn.style.display = 'inline-block';
                        startBtn.disabled = false;
                    }
                    if (stopBtn) {
                        stopBtn.style.display = 'none';
                    }
                } else if (isListening) {
                    // Tự động restart nếu vẫn đang lắng nghe
                    setTimeout(() => {
                        recognition.start();
                    }, 50); // Restart nhanh hơn (50ms)
                }
            };

            // Khởi động lại nhận diện khi kết thúc
            recognition.onend = function () {
                console.log('Khởi động lại nhận diện giọng nói');
                // Chỉ tiếp tục nếu chưa bị người dùng tắt
                if (isListening) {
                    setTimeout(() => {
                        recognition.start();
                    }, 50); // Restart nhanh hơn (50ms)
                } else {
                    if (voiceOutput) {
                        voiceOutput.textContent = "🔇 Đã dừng lắng nghe.";
                    }
                    if (startBtn) {
                        startBtn.style.display = 'inline-block';
                    }
                    if (stopBtn) {
                        stopBtn.style.display = 'none';
                    }
                }
            };

            // Khi trang web tải xong, chuẩn bị nút điều khiển
            window.addEventListener('DOMContentLoaded', function () {
                // Tạo nút điều khiển giọng nói
                const buttonContainer = document.createElement('div');
                buttonContainer.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; gap: 10px; align-items: center;';
                
                startBtn = document.createElement('button');
                startBtn.id = 'start-voice';
                startBtn.innerHTML = '<i class="fa-solid fa-microphone"></i> Bật giọng nói';
                startBtn.style.cssText = 'padding: 10px 20px; font-size: 16px; background-color: #1e88e5; color: white; border: none; border-radius: 8px; cursor: pointer;';
                
                stopBtn = document.createElement('button');
                stopBtn.id = 'stop-voice';
                stopBtn.innerHTML = '🔇 Tắt giọng nói';
                stopBtn.style.cssText = 'padding: 10px 20px; font-size: 16px; background-color: #e53935; color: white; border: none; border-radius: 8px; cursor: pointer; display: none;';
                
                voiceOutput = document.createElement('p');
                voiceOutput.id = 'voice-output';
                voiceOutput.style.cssText = 'margin: 0; color: white; font-size: 14px; text-shadow: 1px 1px 2px black;';
                
                buttonContainer.appendChild(startBtn);
                buttonContainer.appendChild(stopBtn);
                buttonContainer.appendChild(voiceOutput);
                document.body.appendChild(buttonContainer);

                // Thêm event listeners cho nút
                startBtn.addEventListener('click', function () {
                    if (!isListening) {
                        try {
                            recognition.start();
                        } catch (error) {
                            console.error('Không thể bắt đầu nhận diện giọng nói:', error);
                            voiceOutput.textContent = '❌ Lỗi: ' + error.message;
                        }
                    }
                });

                stopBtn.addEventListener('click', function () {
                    isListening = false;
                    recognition.stop();
                });

                // Tự động bật mic khi trang web tải xong
                setTimeout(function () {
                    if (!isListening) {
                        try {
                            recognition.start();
                            console.log('Đã tự động bật microphone');
                        } catch (error) {
                            console.error('Không thể tự động bật microphone (cần tương tác người dùng):', error);
                            voiceOutput.textContent = '🎤 Click "Bật giọng nói" để kích hoạt';
                        }
                    }
                }, 500);
            });
        } else {
            console.error('Trình duyệt không hỗ trợ Web Speech API');
            window.addEventListener('DOMContentLoaded', function () {
                const errorMsg = document.createElement('div');
                errorMsg.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 10px 20px; background-color: #e53935; color: white; border-radius: 8px;';
                errorMsg.textContent = '❌ Trình duyệt không hỗ trợ nhận diện giọng nói';
                document.body.appendChild(errorMsg);
            });
        }

        // Hàm đăng xuất
        function logout() {
            fetch('/api/logout', {
                method: 'POST',
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect || '/login';
                } else {
                    alert('Đăng xuất thất bại: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Lỗi đăng xuất:', error);
                alert('Có lỗi xảy ra khi đăng xuất');
            });
        }
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        .logout-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10000;
            padding: 10px 20px;
            background-color: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s ease;
        }

        .logout-btn:hover {
            background-color: #c62828;
        }

        .app {
            width: 100%;
            height: 100vh;
            background-image: url('https://luatsunguyenhuuphuoc.com/wp-content/uploads/2023/10/thanit2022mar_90-scaled.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-item {
            background-color: #444;
            border-radius: 12px;
            transition: all 0.3s ease;
            height: 200px;
            width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .app-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .app-item:active {
            transform: scale(0.95);
        }

        .app-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .app-item:hover::after {
            opacity: 1;
        }

        .app-item a {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            justify-content: center;
            z-index: 1;
        }

        .app-item img {
            width: 300px;
            height: 200px;
            border-radius: 10px;
            border: 3px solid rgb(90, 56, 56);
            transition: all 0.3s ease;
        }

        .app-item:hover img {
            border-color: rgb(255, 255, 255);
            filter: brightness(1.1);
        }

        /* AI Alert Overlay */
        #ai-alert-overlay {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            width: 80%;
            max-width: 600px;
            display: none;
            animation: slideDown 0.5s ease;
        }

        .ai-alert-card {
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 20px;
            border: 2px solid white;
        }

        .ai-alert-icon {
            font-size: 40px;
            animation: pulse 1s infinite;
        }

        .ai-alert-content h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
        }

        .ai-alert-content p {
            margin: 0;
            font-size: 18px;
            opacity: 0.9;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>

    <script>
        // AI Alert Logic for Driver
        const myVehicleId = {{ vehicle_id|default(0, true)|tojson }};
        let lastAlertId = 0;
        let alertTimeout = null;

        function checkMyAlerts() {
            fetch('/api/get_ai_alerts_history')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success' && data.alerts && data.alerts.length > 0) {
                        const latestAlert = data.alerts[data.alerts.length - 1];
                        
                        // Nếu là cảnh báo cho xe này và là ID mới
                        if (latestAlert.vehicle_id == myVehicleId && latestAlert.id > lastAlertId) {
                            showAIWarning(latestAlert);
                            lastAlertId = latestAlert.id;
                        }
                    }
                })
                .catch(err => console.error('Lỗi lấy cảnh báo:', err));
        }

        function showAIWarning(alert) {
            const overlay = document.getElementById('ai-alert-overlay');
            const msgEl = document.getElementById('ai-alert-msg');
            const titleEl = document.getElementById('ai-alert-title');
            
            titleEl.textContent = alert.level === 'critical' ? '🚨 CẢNH BÁO NGUY HIỂM' : '⚠️ NHẮC NHỞ';
            msgEl.textContent = alert.message;
            
            overlay.style.display = 'block';
            
            // Tự động tắt sau 5 giây
            if (alertTimeout) clearTimeout(alertTimeout);
            alertTimeout = setTimeout(() => {
                overlay.style.display = 'none';
            }, 5000);
            
            // Phát âm thanh cảnh báo nếu có (tùy chọn)
            try {
                const audio = new Audio('/static/sounds/warning.mp3');
                audio.play();
            } catch(e) {}
        }

        // Poll mỗi 2 giây
        if (myVehicleId) {
            setInterval(checkMyAlerts, 2000);
            console.log('Driver monitoring started for vehicle ID:', myVehicleId);
        }
    </script>
